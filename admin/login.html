<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录 - openclaw200 中央数据库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 50px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-header p {
            color: #b0b0b0;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #ffffff;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 8px;
            background: rgba(15, 15, 26, 0.5);
            color: #ffffff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .form-group input::placeholder {
            color: #666;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .forgot-password {
            text-align: center;
            margin-bottom: 20px;
        }

        .forgot-password a {
            color: #00d9ff;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-error {
            background: rgba(255, 95, 86, 0.1);
            border: 1px solid rgba(255, 95, 86, 0.3);
            color: #ff5f56;
        }

        .alert-success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        .alert-info {
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            color: #00d9ff;
            font-size: 13px;
            line-height: 1.6;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: #666;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🦞 openclaw200</h1>
            <p>中央数据库管理系统</p>
        </div>

        <div id="alertBox"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">邮箱</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="请输入邮箱"
                    required
                    value="rao5201@126.com"
                >
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="请输入密码"
                    required
                >
            </div>

            <button type="submit" class="login-btn">登录</button>

            <div class="forgot-password">
                <a href="#" onclick="showForgotPassword()">忘记密码？</a>
            </div>
        </form>

        <div class="alert alert-info" style="margin-top: 20px;">
            <strong>默认管理员账户：</strong><br>
            邮箱：rao5201@126.com<br>
            密码：admin123<br>
            <span style="color: #ffc107;">⚠️ 首次登录后请立即修改密码</span>
        </div>

        <div class="footer">
            <p>© 2026 openclaw200 | 茶海虾王出品</p>
            <p>技术支持：rao5201@126.com</p>
        </div>
    </div>

    <script>
        // 显示提示信息
        function showAlert(message, type = 'info') {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                alertBox.innerHTML = '';
            }, 5000);
        }

        // 处理登录
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showAlert('登录成功！正在跳转...', 'success');
                    localStorage.setItem('token', data.data.token);
                    setTimeout(() => {
                        window.location.href = '/admin/dashboard.html';
                    }, 1000);
                } else {
                    showAlert(data.message || '登录失败，请检查账号密码', 'error');
                }
            } catch (error) {
                // 演示模式：如果 API 不可用，直接跳转
                if (email === 'rao5201@126.com' && password === 'admin123') {
                    showAlert('演示模式：登录成功！正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = '/admin/dashboard.html';
                    }, 1000);
                } else {
                    showAlert('登录失败，请检查账号密码', 'error');
                }
            }
        }

        // 显示忘记密码提示
        function showForgotPassword() {
            alert('忘记密码请联系管理员：rao5201@126.com');
        }

        // 页面加载时显示欢迎信息
        window.onload = function() {
            console.log('%c🦞 openclaw200 后台管理系统', 'font-size: 20px; color: #667eea; font-weight: bold;');
            console.log('%c技术支持：rao5201@126.com', 'font-size: 12px; color: #764ba2;');
        };
    </script>
</body>
</html>
